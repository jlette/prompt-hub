@if(loading()){
  <div class="flex justify-content-center py-6">
    <p-progress-spinner/>
  </div>
} @else {
  <p-card>
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="field">
      <label for="title">Title</label>
      <input formControlName="title" id="title" type="text" pInputText class="w-full">
      <small class="invalid-feedback">Le titre est requis (max 30 caractères)</small>
    </div>
    <div class="field">
      <label for="content">Contenu</label>
      <textarea formControlName="content" id="content" pTextarea class="w-full"></textarea>
      <small class="invalid-feedback">Le contenue est requis</small>
    </div>
    <div class="field">
      <label for="title">Catégorie</label>
      <p-select formControlName="categoryId" inputId="category" class="w-full" optionValue="id" optionLabel="name" [options]="categories()"/>
      <small class="invalid-feedback">Le catégorie est requis</small>
    </div>
    <div class="flex justify-content-end gap-2">
      @if (promptId()){
        <p-button
          [loading]="deleting()"
          class="mr-auto"
          [outlined]="true"
          label="supprimer"
          severity="danger"
          (onClick)="deletePrompt()"
        />
      }
      <p-button routerLink="/" label="annuler" severity="secondary"/>
      <p-button [loading]="submitting()" type="submit" [label]="promptId()? 'Modifier' : 'Créer'"/>
    </div>
  </form>
</p-card>
}
